language: "ja-JP"

reviews:
  profile: "chill"
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!dist/**"
    - "!node_modules/**"
    - "!bun.lock"
    - "!package-lock.json"
    - "!yarn.lock"
    - "!pnpm-lock.yaml"
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.jpeg"
    - "!**/*.gif"
    - "!**/*.svg"
    - "!**/*.ico"

chat:
  auto_reply: true
